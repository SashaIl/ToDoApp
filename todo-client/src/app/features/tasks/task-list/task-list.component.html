<div class="min-h-screen bg-gray-50">

    <!-- Navbar -->
    <div class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <h2 class="text-xl font-bold text-gray-800">My Tasks</h2>
        <button (click)="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium transition">
            Logout
        </button>
    </div>

    <div class="max-w-3xl mx-auto px-4 py-6">

        <!-- error -->
        <div *ngIf="error" class="bg-red-100 text-red-600 text-sm p-3 rounded mb-4">
            {{ error }}
        </div>

        <!-- Search, filter -->
        <div class="flex gap-3 mb-4 flex-wrap">
            <input type="text" placeholder="Search tasks..." [(ngModel)]="search" (input)="onSearch()"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <select [(ngModel)]="selectedCategory" (change)="onCategoryFilter()"
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">All categories</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
            </select>

            <button (click)="showCategoryForm = !showCategoryForm"
                class="px-4 py-2 text-sm border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50 transition font-medium whitespace-nowrap">
                + Category
            </button>

            <button (click)="openCreateForm()"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium whitespace-nowrap">
                + Add Task
            </button>
        </div>

        <!-- New category -->
        <div *ngIf="showCategoryForm" class="flex gap-2 mb-4">
            <input type="text" placeholder="Category name..." [(ngModel)]="newCategoryName"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button (click)="createCategory()"
                class="px-4 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium">
                Save
            </button>
            <button (click)="showCategoryForm = false"
                class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                Cancel
            </button>
        </div>

        <!-- List of tasks -->
        <div class="space-y-3 mb-6">
            <div *ngIf="tasks.length === 0" class="text-center text-gray-400 py-10">
                No tasks found
            </div>

            <div *ngFor="let task of tasks"
                class="bg-white rounded-xl shadow-sm p-4 flex justify-between items-start border border-gray-100">
                <div>
                    <h6 class="font-semibold text-gray-800 mb-1">{{ task.name }}</h6>
                    <p class="text-sm text-gray-500 mb-2">{{ task.description }}</p>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-medium">
                            {{ task.category }}
                        </span>
                        <span class="text-xs text-gray-400">
                            {{ task.createdDate | date:'dd.MM.yyyy' }}
                        </span>
                    </div>
                </div>
                <div class="flex gap-2 ml-4">
                    <button (click)="openEditForm(task)"
                        class="text-sm text-blue-600 hover:text-blue-800 font-medium transition">
                        Edit
                    </button>
                    <button (click)="deleteTask(task.id)"
                        class="text-sm text-red-500 hover:text-red-700 font-medium transition">
                        Delete
                    </button>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div *ngIf="totalPages > 1" class="flex justify-center gap-1">
            <button (click)="goToPage(page - 1)" [disabled]="page === 1"
                class="px-3 py-1 rounded-lg text-sm border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition">
                Previous
            </button>

            <button *ngFor="let p of [].constructor(totalPages); let i = index" (click)="goToPage(i + 1)" [class]="page === i + 1
                ? 'px-3 py-1 rounded-lg text-sm bg-blue-600 text-white font-medium'
                : 'px-3 py-1 rounded-lg text-sm border border-gray-300 hover:bg-gray-100 transition'">
                {{ i + 1 }}
            </button>

            <button (click)="goToPage(page + 1)" [disabled]="page === totalPages"
                class="px-3 py-1 rounded-lg text-sm border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition">
                Next
            </button>
        </div>

    </div>
</div>

<!-- Modal form -->
<div *ngIf="showForm" class="fixed inset-0 bg-gray-400 bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4">
        <div class="flex justify-between items-center px-6 py-4 border-b">
            <h5 class="text-lg font-semibold text-gray-800">
                {{ editingTask ? 'Edit Task' : 'New Task' }}
            </h5>
            <button (click)="closeForm()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">
                &times;
            </button>
        </div>

        <div class="px-6 py-4 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" [(ngModel)]="formName"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea [(ngModel)]="formDescription" rows="3"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                    <select [(ngModel)]="formCategory"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="" disabled>Select category</option>
                        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex justify-end gap-3 px-6 py-4 border-t">
            <button (click)="closeForm()"
                class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                Cancel
            </button>
            <button (click)="onSubmitForm()"
                class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                {{ editingTask ? 'Update' : 'Create' }}
            </button>
        </div>
    </div>
</div>
